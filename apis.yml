name: Google Cloud Secret Manager
description: >-
  Google Cloud Secret Manager is a secure and convenient storage system for
  API keys, passwords, certificates, and other sensitive data. It provides
  a central place to manage, access, and audit secrets across Google Cloud
  with automatic versioning, IAM-based access control, and audit logging.
